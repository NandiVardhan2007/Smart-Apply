services:
  - type: web
    name: smartapply
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false        # Required — Set in Render Dashboard
      - key: JWT_SECRET
        sync: false        # Required — Set in Render Dashboard
      - key: FERNET_KEY
        sync: false        # Optional — for encrypting platform passwords
      - key: NVIDIA_API_KEYS
        sync: false        # Set in Render Dashboard — nvapi-xxxx
      - key: NVIDIA_MODEL
        value: "meta/llama-3.3-70b-instruct"
      - key: RESEND_API_KEY
        sync: false        # Set in Render Dashboard — get key from https://resend.com
      - key: RESEND_FROM
        value: "SmartApply <onboarding@resend.dev>"  # Change to your verified domain after setup
      - key: APP_URL
        value: "https://smart-apply-7zty.onrender.com"
      - key: FRONTEND_URL
        value: "https://smart-apply-7zty.onrender.com"
      - key: DB_NAME
        value: smartapply
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
