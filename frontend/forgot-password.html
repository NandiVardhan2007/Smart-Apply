<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — SmartApply</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div id="toast-container"></div>

  <div class="auth-wrapper">
    <!-- Step 1: Request reset -->
    <div class="auth-card fade-in" id="request-step">
      <div class="logo"><div class="logo-dot"></div>Smart<span>Apply</span></div>
      <h2>Reset password</h2>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <div id="request-error" class="alert alert-error hidden" style="margin-bottom:16px"></div>
      <div id="request-success" class="alert alert-success hidden" style="margin-bottom:16px"></div>

      <form id="request-form" novalidate>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@company.com" />
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="request-btn">
            <span class="spinner"></span>
            <span class="btn-text">Send Reset Link</span>
          </button>
        </div>
      </form>
      <div class="auth-footer"><a href="login.html">← Back to login</a></div>
    </div>

    <!-- Step 2: Set new password (shown when token in URL) -->
    <div class="auth-card fade-in hidden" id="reset-step">
      <div class="logo"><div class="logo-dot"></div>Smart<span>Apply</span></div>
      <h2>Set new password</h2>
      <p class="subtitle">Choose a strong, secure password</p>

      <div id="reset-error" class="alert alert-error hidden" style="margin-bottom:16px"></div>

      <form id="reset-form" novalidate>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" placeholder="Min. 8 characters" autocomplete="new-password" />
            <div class="pw-strength">
              <div class="pw-bar" id="b1"></div>
              <div class="pw-bar" id="b2"></div>
              <div class="pw-bar" id="b3"></div>
              <div class="pw-bar" id="b4"></div>
            </div>
            <span class="field-error"></span>
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Repeat new password" autocomplete="new-password" />
            <span class="field-error"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-btn">
            <span class="spinner"></span>
            <span class="btn-text">Reset Password</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const token = getParam('token');
    if (token) {
      document.getElementById('request-step').classList.add('hidden');
      document.getElementById('reset-step').classList.remove('hidden');
    }

    const bars = [1,2,3,4].map(i => document.getElementById('b'+i));
    document.getElementById('new_password')?.addEventListener('input', function() {
      renderStrength(bars, this.value);
    });

    // Request reset
    document.getElementById('request-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('request-btn');
      const email = document.getElementById('email').value.trim();
      const errEl = document.getElementById('request-error');
      const okEl  = document.getElementById('request-success');
      errEl.classList.add('hidden'); okEl.classList.add('hidden');

      if (!email) { errEl.textContent = 'Please enter your email'; errEl.classList.remove('hidden'); return; }

      setLoading(btn, true);
      try {
        const data = await api.post('/auth/forgot-password', { email });
        okEl.textContent = data.message;
        okEl.classList.remove('hidden');
        btn.disabled = true;
      } catch (err) {
        errEl.textContent = err.detail || 'Something went wrong';
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });

    // Reset password
    document.getElementById('reset-form')?.addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();
      const btn = document.getElementById('reset-btn');
      const newPw  = document.getElementById('new_password').value;
      const confirm = document.getElementById('confirm_password').value;
      const errEl = document.getElementById('reset-error');
      errEl.classList.add('hidden');

      if (newPw.length < 8) { markFieldError('new_password', 'Minimum 8 characters'); return; }
      if (newPw !== confirm) { markFieldError('confirm_password', 'Passwords do not match'); return; }

      setLoading(btn, true);
      try {
        await api.post('/auth/reset-password', { token, new_password: newPw, confirm_password: confirm });
        showToast('Password reset! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'login.html?msg=reset', 1500);
      } catch (err) {
        errEl.textContent = err.detail || 'Reset failed. Try requesting a new link.';
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
