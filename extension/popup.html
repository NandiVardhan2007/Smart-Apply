<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartApply</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="screen-login" class="screen">
  <div class="header">
    <div class="logo-mark">⚡</div>
    <div>
      <div class="brand">SmartApply</div>
      <div class="tagline">AI Job Application Bot</div>
    </div>
  </div>
  <div class="section">
    <label class="field-label">SmartApply Server URL</label>
    <input type="url" id="server-url" placeholder="https://your-app.onrender.com" class="field-input" autocomplete="off">
    <div class="hint">Your SmartApply backend URL</div>
  </div>
  <div class="section">
    <label class="field-label">Email</label>
    <input type="email" id="login-email" placeholder="your@email.com" class="field-input" autocomplete="email">
  </div>
  <div class="section">
    <label class="field-label">Password</label>
    <input type="password" id="login-password" placeholder="••••••••" class="field-input" autocomplete="current-password">
  </div>
  <div id="login-error" class="error-msg hidden"></div>
  <button id="btn-login" class="btn btn-primary btn-full">
    <span class="btn-text">Sign In</span>
    <span class="spinner hidden" id="login-spinner"></span>
  </button>
  <div class="footer-note">Your credentials are only sent to your own SmartApply server.</div>
</div>

<div id="screen-main" class="screen hidden">
  <div class="header">
    <div class="logo-mark">⚡</div>
    <div class="flex-grow">
      <div class="brand">SmartApply</div>
      <div id="user-email-display" class="tagline"></div>
    </div>
    <button id="btn-logout" class="btn-icon" title="Logout">⏏</button>
  </div>

  <div id="profile-card" class="profile-card hidden">
    <div class="profile-avatar" id="profile-avatar">?</div>
    <div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-meta" id="profile-meta"></div>
    </div>
    <div class="profile-status" id="profile-status-badge">
      <span class="dot dot-green"></span> Ready
    </div>
  </div>

  <div id="status-banner" class="status-banner status-idle">
    <span id="status-icon">●</span>
    <span id="status-text">Idle — Open LinkedIn Jobs to start</span>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-applied">0</div><div class="stat-lbl">Applied</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-skipped">0</div><div class="stat-lbl">Skipped</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-errors">0</div><div class="stat-lbl">Errors</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-letters">0</div><div class="stat-lbl">AI Letters</div></div>
  </div>

  <div class="controls-row">
    <button id="btn-start" class="btn btn-primary flex-grow">▶ Start Bot</button>
    <button id="btn-stop" class="btn btn-danger flex-grow hidden">⏹ Stop</button>
    <button id="btn-dryrun" class="btn btn-secondary btn-toggle" title="Dry Run: stop before submit">🔒</button>
  </div>

  <div class="settings-panel">
    <div class="settings-row">
      <label class="toggle-label"><input type="checkbox" id="opt-dry-run" checked><span class="toggle-switch"></span>Dry Run (stop before submit)</label>
    </div>
    <div class="settings-row">
      <label class="toggle-label"><input type="checkbox" id="opt-cover-letter" checked><span class="toggle-switch"></span>AI Cover Letter per job</label>
    </div>
    <div class="settings-row">
      <label class="toggle-label"><input type="checkbox" id="opt-human-mode" checked><span class="toggle-switch"></span>Human-like behavior</label>
    </div>
    <div class="settings-row inline-row">
      <span>Max applications</span>
      <input type="number" id="opt-max-apps" value="20" min="1" max="200" class="field-input small-input">
    </div>
  </div>

  <div class="log-header">
    <span>Activity Log</span>
    <button id="btn-clear-log" class="btn-link">Clear</button>
  </div>
  <div id="activity-log" class="activity-log"></div>

  <div class="bottom-bar">
    <button id="btn-refresh-profile" class="btn-link">↻ Refresh Profile</button>
    <span id="last-refresh" class="muted-text"></span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
